{% extends "base.html" %}
{% block title %}カレンダー — Planet{% endblock %}

{% block content %}
<div class="page">

  <!-- カレンダーカード -->
  <div class="card cal-card cal-heat-posts" id="cal-card">
    <div class="cal-header">
      <div class="date-nav">
        <button onclick="shiftYear(-1)" title="前の年">«</button>
        <button onclick="shiftMonth(-1)" title="前の月">‹</button>
        <select id="sel-month" onchange="onSelChange()"></select>
        <select id="sel-year"  onchange="onSelChange()"></select>
        <button onclick="shiftMonth(1)" title="次の月">›</button>
        <button onclick="shiftYear(1)"  title="次の年">»</button>
      </div>
      <div class="cal-header-right">
        <button id="btn-cal-month" class="cal-view-btn" onclick="goCalMonth()" title="この月のタイムラインを表示"></button>
        <button id="btn-cal-year"  class="cal-view-btn" onclick="goCalYear()"  title="この年のタイムラインを表示"></button>
        <span class="filter-sep"></span>
        <button onclick="goToday()">今日</button>
      </div>
    </div>

    <table class="cal-grid">
      <thead>
        <tr>
          <th class="wn"></th>
          <th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th>
        </tr>
      </thead>
      <tbody id="cal-body"></tbody>
    </table>

    <div class="legend">
      <label class="heat-metric-label">
        <span class="sr-only">ヒートマップの指標</span>
        <select id="heat-metric" class="heat-metric-select" title="ヒートマップの指標">
          <option value="posts">投稿数</option>
          <option value="plays">再生曲数</option>
          <option value="steps">歩数</option>
          <option value="weather">最高気温</option>
        </select>
      </label>
      <div class="lbox" style="border:0.5px solid var(--color-border-tertiary)"></div>
      <div class="lbox" style="background:var(--heat-1)"></div>
      <div class="lbox" style="background:var(--heat-2)"></div>
      <div class="lbox" style="background:var(--heat-3)"></div>
      <div class="lbox" style="background:var(--heat-4)"></div>
      <div class="lbox" style="background:var(--heat-5)"></div>
      <span id="heat-legend-axis" class="heat-legend-axis">少 → 多</span>
    </div>
  </div>

  <!-- 詳細パネル -->
  <div class="detail">
    <div class="detail-header">
      <span class="detail-title" id="detail-title"></span>
      <div class="view-tabs">
        <button class="view-nav" id="tab-prev" onclick="shiftView(-1)" title="前へ">‹</button>
        <button id="tab-day"   class="active" onclick="setViewMode('day')">日</button>
        <button id="tab-week"  onclick="setViewMode('week')">週</button>
        <button id="tab-month" onclick="setViewMode('month')">月</button>
        <button id="tab-year"  onclick="setViewMode('year')">年</button>
        <button class="view-nav" id="tab-next" onclick="shiftView(1)"  title="次へ">›</button>
      </div>
    </div>

    <!-- 統計カード（日ビュー時に表示） -->
    <div class="stat-row" id="stat-row">
      <div class="stat-card" id="stat-posts">
        <div class="stat-label">投稿数</div>
        <div class="stat-val">—</div>
        <div class="stat-src"></div>
      </div>
      <div class="stat-card" id="stat-plays">
        <div class="stat-label">再生曲数</div>
        <div class="stat-val">—</div>
        <div class="stat-src">Last.fm</div>
      </div>
      <div class="stat-card" id="stat-steps">
        <div class="stat-label">歩数</div>
        <div class="stat-val">—</div>
        <div class="stat-src">Apple Watch</div>
      </div>
      <div class="stat-card" id="stat-weather">
        <div class="stat-label">天気</div>
        <div class="stat-val">—</div>
        <div class="stat-src"></div>
      </div>
    </div>

    <!-- 週ビュー時のみ: ISO 週の7日分天気 -->
    <div id="week-weather-strip" class="week-weather-strip" hidden></div>

    <!-- 週・月・年ビュー: サマリー（週天気の下・フィルターの上） -->
    <div id="summary-panel" class="summary-panel" hidden>
      <div class="summary-panel-head" id="summary-panel-head">
        <span class="summary-panel-title" id="summary-panel-title"></span>
        <button type="button" id="summary-generate-btn" class="summary-generate-btn" hidden>この期間で生成</button>
        <button type="button" id="summary-regenerate-btn" class="summary-regenerate-btn" hidden title="既存のサマリーをすべて削除して再生成します">強制再生成</button>
        <div id="summary-generate-progress" class="summary-generate-progress" hidden></div>
      </div>
      <div class="summary-panel-body" id="summary-panel-body"></div>
    </div>

    <!-- ソースフィルター（JS で動的生成） -->
    <div class="filter-bar" id="filter-bar"></div>

    <!-- タイムライン -->
    <div class="timeline" id="timeline">
      <div class="tl-loading">読み込み中…</div>
    </div>
    <div class="no-items" id="no-items">表示できる項目がありません</div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<!-- ライトボックス -->
<div id="lightbox" class="lb-overlay" style="display:none" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="event.stopPropagation(); _closeLightbox()" title="閉じる（Esc）">✕</button>
  <button class="lb-nav lb-prev lb-hidden" onclick="event.stopPropagation(); navigateLightbox(-1)" title="前の画像">‹</button>
  <img id="lb-img" class="lb-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lb-nav lb-next lb-hidden" onclick="event.stopPropagation(); navigateLightbox(1)" title="次の画像">›</button>
  <div id="lb-counter" class="lb-counter lb-hidden"></div>
</div>

<script>
const SOURCES = {{ sources | tojson }};
const TODAY   = "{{ today }}";
</script>
<script src="{{ url_for('static', filename='js/purify.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/summary_markdown.js') }}"></script>
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
{% endblock %}
