<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Planet{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="site-nav">
    <a href="{{ url_for('calendar') }}" class="nav-brand">⬡ PLANET</a>
    <a href="{{ url_for('calendar') }}"  class="nav-link {% if request.endpoint == 'calendar' %}active{% endif %}">カレンダー</a>
    <a href="{{ url_for('search') }}"    class="nav-link {% if request.endpoint == 'search' %}active{% endif %}">検索</a>
    <a href="{{ url_for('summaries') }}" class="nav-link {% if request.endpoint == 'summaries' %}active{% endif %}">サマリー</a>
    <a href="{{ url_for('stats') }}"     class="nav-link {% if request.endpoint == 'stats' %}active{% endif %}">統計</a>
    <a href="{{ url_for('sources') }}"   class="nav-link {% if request.endpoint == 'sources' %}active{% endif %}">ソース管理</a>
    <a href="{{ url_for('prompts_page') }}"  class="nav-link {% if request.endpoint == 'prompts_page' %}active{% endif %}">プロンプト</a>
    <a href="{{ url_for('settings_page') }}" class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}">設定</a>
  </nav>

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
