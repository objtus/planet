{% extends "base.html" %}
{% block title %}ソース管理 — Planet{% endblock %}

{% block content %}
<div class="page-wide">
  <div class="card" style="padding:0">
    <table class="sources-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>名前</th>
          <th>種別</th>
          <th>アカウント</th>
          <th>追加日</th>
          <th style="text-align:center">有効</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td style="color:var(--color-text-tertiary);font-size:11px;font-variant-numeric:tabular-nums">{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td><span style="font-size:11px;color:var(--color-text-secondary)">{{ item.type }}</span></td>
          <td style="font-size:11px;color:var(--color-text-tertiary);font-family:monospace">{{ item.account or '—' }}</td>
          <td style="font-size:11px;color:var(--color-text-tertiary)">{{ item.created_at }}</td>
          <td style="text-align:center">
            <button class="toggle-btn" data-active="{{ 'true' if item.is_active else 'false' }}"
                    onclick="toggleSource({{ item.id }}, this)">
              <span class="toggle-knob"></span>
            </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function toggleSource(id, btn) {
  const res  = await fetch(`/sources/${id}/toggle`, { method: 'POST' });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }
  btn.dataset.active = data.is_active ? 'true' : 'false';
}
</script>
{% endblock %}
